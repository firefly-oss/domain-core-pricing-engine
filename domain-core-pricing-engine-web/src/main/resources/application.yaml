spring:
  application:
    name: domain-core-pricing-engine
    version: 1.0.0
    description: Core Pricing Engine - Domain Layer
    team:
      name: Firefly Software Foundation
      email: dev@getfirefly.io

  threads:
    virtual:
      enabled: true


firefly:
  cqrs:
    enabled: true
    command:
      timeout: 30s
      metrics-enabled: true
      tracing-enabled: true
    query:
      timeout: 15s
      caching-enabled: true
      cache-ttl: 15m
  saga.performance.enabled: true

  # EDA disabled for the MVP scaffold; will be enabled when domain events are emitted.
  eda:
    enabled: false

  stepevents:
    enabled: false

server:
  address: ${SERVER_ADDRESS:localhost}
  port: ${SERVER_PORT:8088}
  shutdown: graceful

# Clients basePath
api-configuration:
  common-platform:
    product-mgmt:
      base-path: ${ENDPOINT_CORE_COMMON_PRODUCT_MGMT:http://localhost:8085}
      timeout: 5s

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tagsSorter: alpha
    operationsSorter: method
    docExpansion: none
    filter: true
  packages-to-scan: com.firefly.domain.core.pricing.engine.web.controllers
  paths-to-match: /api/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
    redis:
      enabled: false

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

---
spring:
  config:
    activate:
      on-profile: dev

logging:
  level:
    root: INFO
    com.firefly: DEBUG

---
spring:
  config:
    activate:
      on-profile: testing

logging:
  level:
    root: INFO
    com.firefly: DEBUG

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

---
spring:
  config:
    activate:
      on-profile: prod

logging:
  level:
    root: WARN
    com.firefly: INFO
    org.springframework: WARN

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
